name: Sync Public Roadmap to digilab-web

on:
  push:
    paths:
      - 'data/public-roadmap.yaml'
    branches:
      - main
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout digilab-app
        uses: actions/checkout@v4

      - name: Checkout digilab-web
        uses: actions/checkout@v4
        with:
          repository: lopezmichael/digilab-web
          token: ${{ secrets.DIGILAB_WEB_TOKEN }}
          path: digilab-web

      - name: Copy roadmap file
        run: |
          mkdir -p digilab-web/src/data
          cp data/public-roadmap.yaml digilab-web/src/data/roadmap.yaml

      - name: Check for changes
        id: changes
        run: |
          cd digilab-web
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd digilab-web
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/roadmap.yaml
          git commit -m "chore: sync roadmap from digilab-app"
          git push
