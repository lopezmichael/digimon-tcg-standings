# DigiLab Public Roadmap
# This file is synced to digilab-web via GitHub Action
# Edit here when shipping features or updating the public roadmap
#
# Structure:
#   - inProgress: Currently being worked on
#   - planned: Approved for future development
#   - completed: Recently shipped (keep last ~6 months)
#
# Each item has:
#   - id: unique identifier (kebab-case)
#   - title: public-facing title
#   - description: 1-2 sentence summary
#   - tags: array of category tags
#   - targetVersion: (inProgress/planned) expected release version
#   - link: (optional) URL to blog post or docs
#   - date: (completed only) month shipped, e.g. "2026-03"
#   - version: (completed only) actual release version
#
# Items are grouped by targetVersion on the roadmap page.
# Use "Future" or omit targetVersion for items without a planned release.

currentVersion: "1.1.2"
lastUpdated: "2026-03-02"

